<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Overlook Strategy | Defining the Horizon</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050a14;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --glass: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 3D Canvas Background */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(5, 10, 20, 0.8) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* UI Layers */
        .ui-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: clamp(2rem, 5vw, 4rem);
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            text-transform: none;
        }

        .brand span {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 4px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2.5s infinite;
        }

        .content-main {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        #cycling-text {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            line-height: 1.1;
            font-style: italic;
            color: var(--text-main);
            opacity: 1;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .coords {
            font-family: monospace;
            opacity: 0.6;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .ui-layer { padding: 2rem 1.5rem; }
            .status-badge { display: none; }
            #cycling-text { font-size: 2.5rem; }
            footer { flex-direction: column; gap: 1rem; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="vignette"></div>

    <div class="ui-layer">
        <header>
            <div class="brand">
                <h1>Overlook</h1>
                <span>Strategy</span>
            </div>
            <div class="status-badge">
                <div class="pulse-dot"></div>
                Calibrating Vantage Points
            </div>
        </header>

        <main class="content-main">
            <h2 id="cycling-text">Mapping the competitive landscape...</h2>
        </main>

        <footer>
            <div class="coords" id="telemetry">VANTAGE: 34.2746° N, 119.2290° W</div>
            <div>&copy; 2026 Overlook Strategy Group</div>
            <div>Institutional Clarity</div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * OVERLOOK STRATEGY - THE TOPOGRAPHIC PULSE
         */

        // 1. Text Cycling Logic
        const phrases = [
            "Mapping the competitive landscape...",
            "Synthesizing market signals...",
            "Calibrating the long-term vision...",
            "Identifying structural tailwinds...",
            "Distilling complexity into clarity...",
            "Optimizing the strategic vector...",
            "Scanning the horizon for disruption..."
        ];

        const textEl = document.getElementById('cycling-text');
        let phraseIndex = 0;

        function updateText() {
            textEl.style.opacity = '0';
            textEl.style.transform = 'translateY(20px) skewY(2deg)';
            
            setTimeout(() => {
                phraseIndex = (phraseIndex + 1) % phrases.length;
                textEl.innerText = phrases[phraseIndex];
                textEl.style.opacity = '1';
                textEl.style.transform = 'translateY(0) skewY(0deg)';
            }, 800);
        }

        setInterval(updateText, 4500);

        // 2. Three.js Terrain Generation
        let scene, camera, renderer, terrain, wireframe;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 100;
            camera.position.y = 40;
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Create Terrain
            const geometry = new THREE.PlaneGeometry(300, 300, 60, 60);
            
            // Perlin-style displacement
            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const y = pos.getY(i);
                // Create a "strategic valley" in the center
                const dist = Math.sqrt(x*x + y*y);
                const z = Math.sin(x/20) * Math.cos(y/20) * 15 + (dist/10);
                pos.setZ(i, z);
            }

            const material = new THREE.MeshBasicMaterial({ 
                color: 0x38bdf8, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.15 
            });

            terrain = new THREE.Mesh(geometry, material);
            terrain.rotation.x = -Math.PI / 2.2;
            scene.add(terrain);

            // Add some "data points" (floating spheres)
            const pointsCount = 15;
            for(let i=0; i<pointsCount; i++) {
                const pGeo = new THREE.SphereGeometry(0.5, 8, 8);
                const pMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.4 });
                const pMesh = new THREE.Mesh(pGeo, pMat);
                pMesh.position.set(
                    (Math.random() - 0.5) * 200,
                    Math.random() * 20 + 5,
                    (Math.random() - 0.5) * 200
                );
                scene.add(pMesh);
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smooth Interpolation for mouse
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            // Apply "Horizon Banking" effect
            terrain.rotation.z = targetX * 0.1;
            terrain.rotation.x = -Math.PI / 2.2 + (targetY * 0.05);
            
            // Continuous movement
            const time = Date.now() * 0.0002;
            const pos = terrain.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const y = pos.getY(i);
                const z = pos.getZ(i);
                // Subtle morphing
                const newZ = z + Math.sin(time + x/10) * 0.05;
                pos.setZ(i, newZ);
            }
            pos.needsUpdate = true;

            // Update Telemetry display
            const telemetry = document.getElementById('telemetry');
            const pitch = (targetY * 10).toFixed(2);
            const bank = (targetX * 10).toFixed(2);
            telemetry.innerText = `PITCH: ${pitch}° | BANK: ${bank}° | ALT: 42,000FT`;

            renderer.render(scene, camera);
        }

        // Listeners
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Touch handling
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                mouseX = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
                mouseY = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
            }
        });

        initThree();
    </script>
</body>
</html>
